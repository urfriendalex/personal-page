name: Deploy to Vercel (Production)

on:
  push:
    branches:
      - master

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || secrets.VERCEL_ACCESS_TOKEN || vars.VERCEL_TOKEN || vars.VERCEL_ACCESS_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate Vercel credentials
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::error::Missing Vercel credentials. Set VERCEL_TOKEN (or VERCEL_ACCESS_TOKEN), VERCEL_ORG_ID, and VERCEL_PROJECT_ID as GitHub Actions secrets or repository variables."
            exit 1
          fi

      - name: Deploy to Vercel
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"
          vercel build --prod --token="${VERCEL_TOKEN}"
          vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
